<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0B1E3D"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <rect width="64" height="64" rx="14" fill="none" stroke="rgba(6,182,212,0.18)" stroke-width="1.5"/>

  <!-- Kidney silhouette (stylised, centred) -->
  <g transform="translate(32,30)" filter="url(#glow)">
    <!-- Left lobe -->
    <path d="M-9,-12 C-16,-12 -19,-6 -19,0 C-19,8 -14,14 -8,14 C-4,14 -1,11 0,8 C1,11 4,14 8,14 C14,14 19,8 19,0 C19,-6 16,-12 9,-12 C5,-12 2,-9 0,-5 C-2,-9 -5,-12 -9,-12 Z"
          fill="url(#accent)" opacity="0.92"/>
  </g>

  <!-- Heartbeat / ECG line cutting across kidney -->
  <polyline
    points="8,32 16,32 19,24 22,40 26,28 30,36 34,32 56,32"
    fill="none"
    stroke="#0F172A"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.85"
  />

  <!-- Live dot top-right -->
  <circle cx="52" cy="13" r="4.5" fill="#06B6D4" opacity="0.9"/>
  <circle cx="52" cy="13" r="4.5" fill="none" stroke="rgba(6,182,212,0.4)" stroke-width="2.5"/>
</svg>
